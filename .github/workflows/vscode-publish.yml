name: Publish VS Code Extension

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build elps (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            target: linux-x64
          - goos: linux
            goarch: arm64
            target: linux-arm64
          - goos: darwin
            goarch: amd64
            target: darwin-x64
          - goos: darwin
            goarch: arm64
            target: darwin-arm64
          - goos: windows
            goarch: amd64
            target: win32-x64
            ext: .exe
          - goos: windows
            goarch: arm64
            target: win32-arm64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build binary
        run: |
          mkdir -p editors/vscode/bin
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -trimpath \
            -o editors/vscode/bin/elps${{ matrix.ext }} .
          chmod +x editors/vscode/bin/elps${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: editors/vscode/bin/

  publish-platform:
    name: Publish (${{ matrix.target }})
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-x64
          - target: linux-arm64
          - target: darwin-x64
          - target: darwin-arm64
          - target: win32-x64
          - target: win32-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: editors/vscode/bin/

      - name: Ensure executable
        run: chmod +x editors/vscode/bin/elps*

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Set version in package.json
        working-directory: editors/vscode
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Build extension
        working-directory: editors/vscode
        run: npm run build

      - name: Publish platform package
        working-directory: editors/vscode
        run: npx vsce publish --target ${{ matrix.target }} -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-universal:
    name: Publish (universal)
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Set version in package.json
        working-directory: editors/vscode
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Build extension
        working-directory: editors/vscode
        run: npm run build

      - name: Publish universal package
        working-directory: editors/vscode
        run: npx vsce publish -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
